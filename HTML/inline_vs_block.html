<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline vs Block Elements</title>
    <!--
        Notes:
        1. <!DOCTYPE html> - Declares HTML5 document type.
        2. <html lang="en"> - Root element of HTML with language attribute.
        3. <head> contains meta info like charset, viewport, and title.
    -->
</head>
<body>
    <!-- Block Element Example -->
    <h1>Hello World</h1>
    <!--
        Notes:
        1. <h1> is a block-level element.
        2. Block elements start on a new line and take full width available.
        3. Examples: <h1> to <h6>, <p>, <div>, <ul>, <li>, <section>, <header>
    -->

    <h1>Apna College</h1>

    <p>Hello</p>
    <!--
        Notes:
        1. <p> is a block element for paragraphs.
        2. Each <p> starts on a new line by default.
    -->

    <p>Apna College</p>

    <!-- Inline Element Example -->
    <a href="https://www.google.com/">Google</a>
    <!--
        Notes:
        1. <a> is an inline element.
        2. Inline elements do not start on a new line.
        3. They occupy only as much width as necessary.
        4. Examples: <a>, <span>, <img>, <strong>, <em>
    -->

    <a href="https://www.facebook.com/">Facebook</a>
    <a href="https://www.youtube.com/">YouTube</a>

    <!-- Image Example -->
    <img src="img.jpeg" alt="Sample Image" height="100">
    <img src="my img.jpg" alt="My Image" height="100">
    <!--
        Notes:
        1. <img> is an inline element.
        2. It can be placed inside text or alongside other inline elements.
        3. Always use alt attribute for accessibility.
        4. Use height/width to control image size.
    -->

    <!-- Summary Notes for Interview -->
    <!--
        Block vs Inline Elements:

        Block Elements:
        - Start on a new line.
        - Take full width of parent container.
        - Can contain inline elements and other block elements.
        Examples: <div>, <p>, <h1>, <section>, <form>

        Inline Elements:
        - Do not start on a new line.
        - Only take as much width as necessary.
        - Can be placed inside block elements.
        Examples: <a>, <span>, <img>, <strong>, <em>
    -->
</body>
</html>
