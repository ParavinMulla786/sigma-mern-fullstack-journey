<!DOCTYPE html>
<html lang="en">
<!-- 
    <!DOCTYPE html> → Declares the document type and version of HTML (HTML5 here)
    <html lang="en"> → Root element of HTML document, 'lang' specifies language as English
-->
<head>
    <meta charset="UTF-8">
    <!-- 
        <meta charset="UTF-8"> → Defines the character encoding as UTF-8 (supports most characters)
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> → Makes website responsive on mobile devices
    -->
    <title>Div Element</title>
    <!-- 
        <title> → Title of the webpage displayed in browser tab
    -->
</head>
<body>
    <!-- 
        <body> → Main content of the webpage goes inside body
    -->

    <div>
        <!-- 
            <div> → Block-level container. Used to group elements together.
            Useful for styling or structuring content
        -->
        <a href="https://www.google.com/">Google</a>
        <!-- 
            <a> → Anchor tag, creates a hyperlink
            href → Hyperlink reference (URL)
            Text between <a> and </a> → Clickable text
        -->

        <a href="https://www.youtube.com/">Youtube</a>
    </div>

    <a href="https://www.facebook.com/">Facebook</a>
    <!-- 
        Anchor outside div → Shows you can have links inside or outside containers
    -->
</body>
</html>
