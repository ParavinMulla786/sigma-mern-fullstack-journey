<!DOCTYPE html>
<!-- Declares HTML5 document -->

<html lang="en">
<!-- Root element, language set to English -->

<head>
    <meta charset="UTF-8">
    <!-- Supports all characters -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes page responsive on mobile -->

    <title>Registration Form</title>
</head>

<body>

    <h3>Registration Form</h3>

    <!-- Form starts here -->
    <form action="/action" method="post">
    <!-- 
        action → where data will be sent
        method="post" → data sent securely
    -->

        <!-- First Name & Last Name -->
        <div>
            <input type="text" 
                   placeholder="First Name" 
                   name="fname" 
                   required>

            <input type="text" 
                   placeholder="Last Name" 
                   name="lname" 
                   required>
            <!-- required → field compulsory -->
        </div>

        <br>

        <!-- Gender Dropdown -->
        <div>
            <label for="gender">Select Your Gender:</label>

            <select name="gender" id="gender">
                <!-- select creates dropdown list -->

                <option value="">Select Gender</option>
                <!-- Default option -->

                <option value="female">Female</option>
                <option value="male">Male</option>
                <option value="other">Others</option>
            </select>
        </div>

        <br>

        <!-- Checkbox -->
        <div>
            Do you agree to the terms and conditions?

            <input type="checkbox" 
                   id="term" 
                   name="term" 
                   required>

            <label for="term">Yes I Agree</label>
            <!-- required → must tick before submit -->
        </div>

        <br>

        <!-- Submit Button -->
        <div>
            <button type="submit">Submit</button>
            <!-- Sends form data -->
        </div>

    </form>
    <!-- Form ends here -->

</body>
</html>
