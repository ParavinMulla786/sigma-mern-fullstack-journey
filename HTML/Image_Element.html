<!DOCTYPE html>
<!-- HTML5 document type declaration -->
<html lang="en">
<!-- Root element of HTML page, lang="en" means English language -->

<head>
    <meta charset="UTF-8">
    <!-- UTF-8 supports all characters like English, Marathi, Hindi -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes website responsive on mobile devices -->

    <title>Image Example</title>
    <!-- Title displayed on browser tab -->
</head>

<body>
    <!-- Body section contains visible content of webpage -->

    <!-- Normal Image from File -->
    <img src="img.jpeg" alt="cs aspire" height="100" width="100">
    
    <!-- 
        src="img.jpeg"  → Image file path (image must be in same folder)
        alt="cs aspire" → Alternative text (shown if image not loaded)
        height="100"    → Image height in pixels
        width="100"     → Image width in pixels
    -->

    <br><br>
    <!-- Line break to create space between images -->

    <!-- Base64 Image -->
    <img 
        src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/..."
        alt="Laptop Image"
        height="150"
        width="150"
    >

    <!-- 
        data:image/jpeg;base64 → Image is encoded directly in HTML
        No separate image file required
        alt="Laptop Image" → Text shown if image fails to load
        height="150" width="150" → Sets image size
    -->

</body>
</html>
