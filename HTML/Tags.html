<!DOCTYPE html> 
<!-- This tells the browser that this document is HTML5 -->

<html lang="en">
<!-- Root element of HTML page -->
<!-- lang="en" specifies the language of the document -->

<head>
    <meta charset="UTF-8">
    <!-- Defines character encoding (UTF-8 supports almost all characters) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes website responsive on mobile devices -->

    <title>Document</title>
    <!-- Title shown in browser tab -->
</head>

<body>
    <!-- All visible content of webpage goes inside body -->

    <!-- Simple paragraph -->
    <p>Twinkle twinkle little star How I wonder what you are</p> 

    <!-- Paragraph with formatting tags -->
    <p> 
        <b>Twinkle twinkle</b>  
        <!-- <b> makes text bold (non-semantic tag) -->

        <br>  
        <!-- <br> inserts a line break -->

        <i>little star</i>
        <!-- <i> makes text italic -->

        <br>

        <u>How I wonder</u>
        <!-- <u> underlines the text -->

        <br>

        what you are
        <!-- Normal text -->
    </p> 

</body>
</html>
