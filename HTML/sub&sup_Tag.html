<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive design for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title shown in browser tab -->
    <title>Superscript and Subscript</title>
</head>
<body>

    <!-- 
        <h1> is a heading tag.
        It is a block element and creates a large heading.
    -->

    <!-- 
        <sup> is used for superscript text.
        Superscript text appears slightly above the normal line.
        Example: Mathematical powers (a², x³)
    -->
    <h1>a<sup>2</sup></h1>

    <!-- 
        <sub> is used for subscript text.
        Subscript text appears slightly below the normal line.
        Example: Chemical formulas (H₂O, CO₂)
    -->
    <h1>H<sub>2</sub>O</h1>

</body>
</html>
