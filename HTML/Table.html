<!DOCTYPE html>
<!-- Declares HTML5 document type -->

<html lang="en">
<!-- Root element of HTML page. lang="en" means English language -->

<head>
    <meta charset="UTF-8">
    <!-- Supports special characters like ₹ symbol -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes page responsive on mobile devices -->

    <title>Food Menu Table</title>
    <!-- Title shown in browser tab -->
</head>

<body>
    <!-- Body contains visible content -->

    <table border="1">
        <!-- Creates a table. border="1" adds simple border -->

        <caption><b>Food Menu</b></caption>
        <!-- Caption gives title to the table -->

        <!-- ===== TABLE HEAD SECTION ===== -->
        <thead>
            <tr>
                <!-- rowspan="2" makes this header occupy 2 rows vertically -->
                <th rowspan="2">Item</th>

                <!-- colspan="2" merges 2 columns horizontally -->
                <th colspan="2">Price</th>
            </tr>

            <tr>
                <!-- Sub headers under Price -->
                <th>IND (₹)</th>
                <th>USD ($)</th>
            </tr>
        </thead>

        <!-- ===== TABLE BODY SECTION ===== -->
        <tbody>
            <tr>
                <td>Frooti</td>  <!-- Table data -->
                <td>10</td>
                <td>0.14</td>
            </tr>

            <tr>
                <td>Samosa</td>
                <td>15</td>
                <td>0.18</td>
            </tr>

            <tr>
                <td>Chips</td>
                <td>20</td>
                <td>0.24</td>
            </tr>
        </tbody>

    </table>

</body>
</html>
