<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Menu Table</title>
</head>
<body>

    <table border="1">
        <caption><b>Food Menu</b></caption>

        <!-- Table Head -->
        <thead>
            <tr>
                <th rowspan="2">Item</th>
                <th colspan="2">Price</th>
            </tr>
            <tr>
                <th>IND (₹)</th>
                <th>USD ($)</th>
            </tr>
        </thead>

        <!-- Table Body -->
        <tbody>
            <tr>
                <td>Frooti</td>
                <td>10</td>
                <td>0.14</td>
            </tr>
            <tr>
                <td>Samosa</td>
                <td>15</td>
                <td>0.18</td>
            </tr>
            <tr>
                <td>Chips</td>
                <td>20</td>
                <td>0.24</td>
            </tr>
        </tbody>

    </table>

</body>
</html>
