<!DOCTYPE html>
<!-- Declares HTML5 document type -->

<html lang="en">
<!-- Root element of HTML page, lang="en" means English language -->

<head>
    <meta charset="UTF-8">
    <!-- Supports all characters (Unicode support) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes website responsive on mobile devices -->

    <title>User Registration Form</title>
    <!-- Title shown on browser tab -->
</head>

<body>
    <!-- Body contains all visible content -->

    <h2>User Registration Form</h2>
    <!-- Heading tag -->

    <form action="/action" method="post">
        <!-- 
            form tag collects user data
            action → where data will be sent
            method="post" → data sent securely (not visible in URL)
        -->

        <!-- TEXT INPUT -->
        <div>
            <label for="username">Username:</label>
            <!-- label connects with input using for & id -->

            <input type="text" 
                   id="username" 
                   name="username" 
                   placeholder="Enter Username" 
                   required>
            <!-- 
                type="text" → normal text input
                name → used to send data to server
                placeholder → hint text
                required → compulsory field
            -->
        </div>

        <br>

        <!-- PASSWORD INPUT -->
        <div>
            <label for="password">Password:</label>

            <input type="password" 
                   id="password" 
                   name="password" 
                   placeholder="Enter Password" 
                   required>
            <!-- 
                type="password" → hides characters
            -->
        </div>

        <br>

        <!-- NUMBER INPUT -->
        <div>
            <label for="age">Age:</label>

            <input type="number" 
                   id="age" 
                   name="age" 
                   min="1" 
                   max="100" 
                   placeholder="Enter Age">
            <!-- 
                type="number" → allows only numbers
                min & max → range restriction
            -->
        </div>

        <br>

        <!-- SINGLE CHECKBOX -->
        <div>
            <input type="checkbox" 
                   id="adult" 
                   name="adult" 
                   checked>
            <!-- checked → selected by default -->

            <label for="adult">I am 18+</label>
        </div>

        <br>

        <!-- RADIO BUTTONS -->
        <div>
            <p>Select Your Favorite Fruit:</p>

            <input type="radio" name="fruit" id="apple" value="apple">
            <label for="apple">Apple</label>

            <input type="radio" name="fruit" id="mango" value="mango">
            <label for="mango">Mango</label>

            <input type="radio" name="fruit" id="orange" value="orange">
            <label for="orange">Orange</label>

            <!-- 
                Same name="fruit" 
                → only one option can be selected
                value → actual data sent to server
            -->
        </div>

        <br>

        <!-- MULTIPLE CHECKBOX -->
        <div>
            <p>Select Subjects:</p>

            <input type="checkbox" name="subjects[]" id="maths" value="maths">
            <label for="maths">Maths</label>

            <input type="checkbox" name="subjects[]" id="science" value="science">
            <label for="science">Science</label>

            <input type="checkbox" name="subjects[]" id="english" value="english">
            <label for="english">English</label>

            <!-- 
                subjects[] → allows multiple values 
                Multiple checkboxes can be selected
            -->
        </div>

        <br>

        <!-- DROPDOWN -->
        <div>
            <label for="profession">Profession:</label>

            <select name="profession" id="profession">
                <!-- select creates dropdown -->

                <option value="">Select Profession</option>
                <!-- default option -->

                <option value="student">Student</option>
                <option value="developer">Developer</option>
            </select>
        </div>

        <br>

        <!-- TIME INPUT -->
        <div>
            <label for="time">Select Time:</label>
            <input type="time" id="time" name="time">
            <!-- time picker input -->
        </div>

        <br>

        <!-- RANGE INPUT -->
        <div>
            <label for="vol">Select Volume:</label>
            <input type="range" id="vol" name="vol" min="0" max="100">
            <!-- slider input -->
        </div>

        <br>

        <!-- TEXTAREA -->
        <div>
            <label for="feedback">Feedback:</label>

            <textarea id="feedback" 
                      name="feedback" 
                      rows="4" 
                      cols="30"
                      placeholder="Write your feedback here"></textarea>
            <!-- 
                textarea → multi-line text input
                rows & cols → size control
            -->
        </div>

        <br>

        <!-- COLOR INPUT -->
        <div>
            <label for="color">Choose Color:</label>
            <input type="color" id="color" name="color">
            <!-- opens color picker -->
        </div>

        <br><br>

        <!-- BUTTONS -->
        <button type="submit">Submit</button>
        <!-- sends form data -->

        <button type="reset">Reset</button>
        <!-- clears all form fields -->

    </form>

</body>
</html>
