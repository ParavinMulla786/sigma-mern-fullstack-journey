<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding for proper text display -->
    <meta charset="UTF-8">

    <!-- Makes website responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title shown in browser tab -->
    <title>Span Element</title>
</head>
<body>

    <!-- 
        <span> is an inline element.
        It is used to group small parts of text or inline elements.
        It does NOT start on a new line.
    -->
    <span>
        <!-- 
            Always use https:// before website link.
            Otherwise link may not work properly.
        -->
        <a href="https://www.google.com">Google</a>

        <!-- Anchor tag creates hyperlink -->
        <a href="https://www.youtube.com">YouTube</a>
    </span>

</body>
</html>
