<!DOCTYPE html>
<!-- Declares that this document uses HTML5 -->

<html lang="en">
<!-- Root element of the webpage
     lang="en" tells the browser that the language of the page is English -->

<head>
    <meta charset="UTF-8">
    <!-- Defines the character encoding as UTF-8 so special characters display properly -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes the webpage responsive on mobile devices -->

    <title>Grid</title>
    <!-- Title that appears on the browser tab -->

    <link rel="stylesheet" href="style.css">
    <!-- Connects the external CSS file (style.css) to this HTML page -->
</head>

<body>

    <h1>Grid PlayGround</h1>
    <!-- Main heading displayed on the webpage -->

    <div class="container">
        <!-- Container div that will hold all grid items -->

        <div class="item">1</div>
        <!-- Grid item box displaying number 1 -->

        <div class="item">2</div>
        <!-- Grid item box displaying number 2 -->

        <div class="item">3</div>
        <!-- Grid item box displaying number 3 -->

        <div class="item">4</div>
        <!-- Grid item box displaying number 5 -->

        <div class="item">5</div>
        <!-- Grid item box displaying number 6 -->

    </div>

</body>
</html>
